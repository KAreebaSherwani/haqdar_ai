services:
  - type: web
    name: haqdar-backend
    runtime: python
    plan: free
    buildCommand: pip install uv && uv sync --frozen --no-dev || uv sync
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
